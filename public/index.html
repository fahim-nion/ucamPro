<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCAM PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @keyframes fillProgress { from { width: 0; } }
        .animate-fill { animation: fillProgress 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans transition-colors duration-300">

    <!-- LOGIN SECTION -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4 bg-gradient-to-br from-base-200 to-base-300">
        <div class="card w-full max-w-sm bg-base-100 shadow-2xl p-8 md:p-10 rounded-[2.5rem] border border-white/5">
            
            <!-- Developer Card -->
            <div class="bg-base-200 p-6 rounded-3xl mb-8 border border-base-300 text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-5 transition-opacity"></div>
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-1">Developed By</p>
                <p class="text-xl font-black text-primary tracking-tight">Fahim Morshed</p>
                <div class="flex justify-center gap-6 mt-4">
                    <a href="https://github.com/fahim-nion/" target="_blank" class="text-xl hover:text-primary transition-all hover:scale-110"><i class="fa-brands fa-github"></i></a>
                    <a href="https://x.com/FahimM0rshed" target="_blank" class="text-xl hover:text-primary transition-all hover:scale-110"><i class="fa-brands fa-x-twitter"></i></a>
                </div>
            </div>
            
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black italic tracking-tighter">UCAM<span class="text-primary">PRO</span></h1>
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-[0.3em] mt-1">Student Intelligence</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="user-id" placeholder="Student ID" class="input input-bordered w-full rounded-2xl bg-base-200 border-none h-14" />
                <input type="password" id="user-pass" placeholder="Password" class="input input-bordered w-full rounded-2xl bg-base-200 border-none h-14" />
                <button id="login-btn" onclick="handleLogin()" class="btn btn-primary w-full rounded-2xl shadow-lg shadow-primary/30 h-14 text-lg">Sign In</button>
            </div>
            <p id="login-status" class="text-error text-xs mt-4 text-center font-bold min-h-[1rem]"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-72 bg-base-100 md:h-screen sticky top-0 flex flex-col border-b md:border-r border-base-300 z-50">
            <div class="p-6 md:p-8 flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-tighter text-primary">UCAMPRO</h2>
                <input type="checkbox" class="toggle toggle-primary toggle-sm" id="theme-toggle" />
            </div>
            
            <nav class="px-4 md:px-6 space-y-2 pb-4 overflow-y-auto sidebar-scroll flex-1">
                <button onclick="showSection('profile')" id="btn-profile" class="btn btn-ghost justify-start w-full gap-4 rounded-2xl no-animation"><i class="fa-solid fa-shapes"></i> Overview</button>
                <button onclick="showSection('attendance')" id="btn-attendance" class="btn btn-ghost justify-start w-full gap-4 rounded-2xl no-animation"><i class="fa-solid fa-fingerprint"></i> Attendance</button>
                <button onclick="showSection('results')" id="btn-results" class="btn btn-ghost justify-start w-full gap-4 rounded-2xl no-animation"><i class="fa-solid fa-award"></i> Results</button>
                <button onclick="showSection('routine')" id="btn-routine" class="btn btn-ghost justify-start w-full gap-4 rounded-2xl no-animation"><i class="fa-solid fa-calendar-day"></i> Routine</button>
            </nav>

            <div id="sync-indicator" class="mt-auto p-6 border-t border-base-200 flex items-center gap-3">
                <span class="loading loading-spinner loading-xs text-primary"></span>
                <span class="text-[10px] font-bold opacity-40 uppercase tracking-widest">System Booting...</span>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto bg-base-200/50">
            <div id="section-content" class="max-w-5xl mx-auto flex flex-col min-h-full">
                <!-- Content renders here -->
            </div>
        </main>
    </div>

    <script>
        let APP_DATA = {};
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.onchange = (e) => document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');

        async function handleLogin() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            const btn = document.getElementById('login-btn');
            const status = document.getElementById('login-status');

            if (!id || !pass) { status.innerText = "Enter credentials"; return; }
            btn.disabled = true;
            btn.innerHTML = '<span class="loading loading-spinner"></span> Initializing...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: id, password: pass })
                });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || "Login Failed");
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                showSection('profile');
                prefetchAll();
            } catch (e) {
                status.innerText = e.message;
                btn.disabled = false; btn.innerText = "Try Again";
            }
        }

        async function prefetchAll() {
            const sections = ['profile', 'attendance', 'results', 'routine'];
            const indicator = document.getElementById('sync-indicator');
            for (const s of sections) {
                try {
                    indicator.innerHTML = `<span class="loading loading-spinner loading-xs text-primary"></span> <span class="text-[10px] font-bold opacity-40 uppercase tracking-widest text-primary">Extracting ${s}...</span>`;
                    const res = await fetch(`/api/${s}`);
                    const data = await res.json();
                    if (!data.error) {
                        APP_DATA[s] = data;
                        if (window.currentSection === s) renderData(s);
                    }
                    await new Promise(r => setTimeout(r, 2000)); 
                } catch (e) { console.error(e); }
            }
            indicator.innerHTML = '<i class="fa-solid fa-check-double text-success"></i> <span class="text-[10px] font-bold opacity-40 uppercase tracking-widest text-success">Extraction Complete</span>';
        }

        function showSection(s) {
            window.currentSection = s;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-primary/10', 'text-primary', 'shadow-sm'));
            document.getElementById(`btn-${s}`).classList.add('bg-primary/10', 'text-primary', 'shadow-sm');
            if (!APP_DATA[s]) {
                document.getElementById('section-content').innerHTML = `<div class="flex flex-col items-center justify-center min-h-[50vh]"><span class="loading loading-ring loading-lg text-primary"></span></div>`;
                return;
            }
            renderData(s);
        }

        function renderData(s) {
            const container = document.getElementById('section-content');
            const data = APP_DATA[s];
            container.innerHTML = "";
            const wrapper = document.createElement('div');
            wrapper.className = "fade-in-up flex-1";

            if (s === 'profile') {
                const dayAbbr = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][new Date().getDay()];
                let todaysClasses = (APP_DATA.routine && APP_DATA.routine[dayAbbr]) ? APP_DATA.routine[dayAbbr] : [];

                wrapper.innerHTML = `
                    <div class="mb-10">
                        <h1 class="text-5xl font-black mb-2 italic tracking-tight">Hello, ${data.name.split(' ')[0]}</h1>
                        <p class="text-xs font-bold opacity-40 uppercase tracking-[0.4em]">Academic Overview</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Main Personal Details Card -->
                        <div class="lg:col-span-2 bg-base-100 rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-white/5 flex flex-col justify-between">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="bg-primary/10 p-4 rounded-2xl">
                                    <i class="fa-solid fa-address-card text-2xl text-primary"></i>
                                </div>
                                <div>
                                    <h3 class="text-xl font-black">Personal Details</h3>
                                    <p class="text-xs opacity-50 font-bold uppercase tracking-widest">Verified Student Info</p>
                                </div>
                            </div>

                            <!-- Modern Info Grid -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-y-8 gap-x-12">
                                <div class="space-y-1">
                                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-envelope"></i> Email Address
                                    </p>
                                    <p class="font-bold text-base break-all">${data.email}</p>
                                </div>
                                <div class="space-y-1">
                                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-phone"></i> Phone Number
                                    </p>
                                    <p class="font-bold text-base">${data.phone}</p>
                                </div>
                                <div class="space-y-1">
                                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-calendar-day"></i> Date of Birth
                                    </p>
                                    <p class="font-bold text-base">${data.dob || 'N/A'}</p>
                                </div>
                                <div class="space-y-1">
                                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-droplet text-error"></i> Blood Group
                                    </p>
                                    <p class="font-bold text-base">${data.blood || 'N/A'}</p>
                                </div>
                                <div class="space-y-1">
                                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-hands-praying"></i> Religion
                                    </p>
                                    <p class="font-bold text-base">${data.religion || 'N/A'}</p>
                                </div>
                                <div class="space-y-1">
                                    <p class="text-[10px] font-black opacity-30 uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-user-tag"></i> Gender
                                    </p>
                                    <p class="font-bold text-base">${data.gender || 'N/A'}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Today's Schedule Card -->
                        <div class="bg-primary text-primary-content p-8 rounded-[2.5rem] shadow-2xl shadow-primary/30 relative overflow-hidden flex flex-col">
                            <i class="fa-solid fa-bolt-lightning absolute -right-6 -top-6 text-9xl opacity-10 rotate-12"></i>
                            
                            <h2 class="text-2xl font-black mb-8 relative z-10">Today's<br>Schedule</h2>
                            
                            <div class="space-y-4 relative z-10 flex-1">
                                ${todaysClasses.length > 0 ? todaysClasses.map(c => `
                                    <div class="bg-white/10 backdrop-blur-md p-5 rounded-3xl border border-white/10 hover:bg-white/15 transition-colors">
                                        <p class="text-[10px] uppercase opacity-70 font-black tracking-widest mb-1">${c.time}</p>
                                        <p class="font-bold leading-tight text-sm">${c.course}</p>
                                        <div class="mt-3 pt-3 border-t border-white/5 flex justify-between items-center">
                                            <span class="text-[10px] font-medium opacity-60"><i class="fa-solid fa-user-tie mr-1"></i> ${c.faculty.split(' ').pop()}</span>
                                            <span class="badge badge-ghost badge-xs text-[9px] py-2">RM ${c.room || '--'}</span>
                                        </div>
                                    </div>
                                `).join('') : `
                                    <div class="flex-1 flex flex-col items-center justify-center opacity-60">
                                        <i class="fa-solid fa-mug-hot text-5xl mb-4"></i>
                                        <p class="text-xs font-bold uppercase tracking-[0.2em]">No Classes Today</p>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>`;
            }

            if (s === 'attendance') {
                let cards = data.map(c => {
                    const percent = parseFloat(c.present_percentage);
                    let boxClass = "bg-base-100 text-base-content";
                    let textClass = "text-primary";
                    let progClass = "progress-primary";
                    let warningIcon = "";

                    if (percent < 70) {
                        boxClass = "bg-error text-error-content shadow-error/40";
                        textClass = "text-white";
                        progClass = "progress-ghost bg-white/20";
                        warningIcon = '<i class="fa-solid fa-triangle-exclamation animate-pulse mr-2"></i>';
                    } else if (percent < 80) {
                        textClass = "text-orange-500";
                        progClass = "progress-warning";
                    }

                    return `
                    <div class="${boxClass} p-8 rounded-[2rem] shadow-xl border border-white/5 flex flex-col justify-between transition-all duration-500">
                        <h3 class="font-bold text-sm mb-6 h-10 overflow-hidden leading-tight">${c.title}</h3>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-3xl font-black ${textClass}">${warningIcon}${c.present_percentage}</span>
                            </div>
                            <progress class="progress ${progClass} w-full h-3 mt-2" value="${percent}" max="100"></progress>
                        </div>
                    </div>`;
                }).join('');
                wrapper.innerHTML = `<h1 class="text-4xl font-black mb-10 italic">Attendance</h1><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${cards}</div>`;
                setTimeout(() => document.querySelectorAll('progress').forEach(p => p.classList.add('animate-fill')), 100);
            }

            if (s === 'results') {
                let rows = (data.results || []).map(r => `
                    <tr class="hover border-base-200"><td class="p-4 font-bold">${r.semester}</td><td>${r.gpa}</td><td class="font-black text-primary">${r.cgpa}</td></tr>
                `).join('');
                wrapper.innerHTML = `
                    <div class="flex justify-between items-end mb-10">
                        <h1 class="text-4xl font-black italic">Academic History</h1>
                        <div class="bg-primary text-primary-content px-8 py-4 rounded-[2rem] shadow-xl text-center">
                            <p class="text-xs font-bold uppercase opacity-60">Final CGPA</p>
                            <p class="text-4xl font-black">${data.final_cgpa}</p>
                        </div>
                    </div>
                    <div class="bg-base-100 rounded-[2rem] shadow-xl overflow-hidden border border-white/5">
                        <table class="table w-full">
                            <thead><tr class="bg-base-200 border-none text-[10px] uppercase font-black opacity-40"><th>Semester</th><th>GPA</th><th>CGPA</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            }

            if (s === 'routine') {
                let routineHtml = "";
                Object.entries(data).forEach(([day, classes]) => {
                    if (classes.length === 0) return;
                    const classCards = classes.map(c => `
                        <div class="bg-base-100 p-6 rounded-2xl shadow-md border border-white/5 flex flex-col md:flex-row justify-between gap-4">
                            <div class="flex-1"><h4 class="text-lg font-bold">${c.course}</h4></div>
                            <div class="text-right">
                                <p class="text-primary font-bold"><i class="fa-solid fa-clock"></i> ${c.time}</p>
                                <p class="text-sm opacity-70">${c.faculty}</p>
                            </div>
                        </div>
                    `).join("");
                    routineHtml += `<div class="mb-8"><h3 class="text-xl font-black mb-4 text-primary">${day}</h3><div class="space-y-3">${classCards}</div></div>`;
                });
                wrapper.innerHTML = `<h1 class="text-4xl font-black mb-2 italic">Class Routine</h1><p class="text-xs uppercase opacity-40 mb-10 font-bold tracking-widest">Weekly Academic Schedule</p>${routineHtml}`;
            }

            // Developer Footer (Bottom of every page)
            const devFooter = document.createElement('div');
            devFooter.className = "mt-20 pb-10 text-center border-t border-base-300 pt-8";
            devFooter.innerHTML = `<p class="opacity-30 text-[10px] font-bold uppercase tracking-[0.3em]">Developed By: Fahim Morshed</p>`;
            
            wrapper.appendChild(devFooter);
            container.appendChild(wrapper);
        }
    </script>
</body>
</html>
